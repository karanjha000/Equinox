# ===================================
# Database Configuration (Production - PostgreSQL)
# ===================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===================================
# Security & JWT Configuration (Production)
# ===================================
# Strict requirement for JWT_SECRET environment variable
jwt.secret=${JWT_SECRET}

# ===================================
# CORS Configuration (Production)
# ===================================
app.cors.allowed-origins=https://finance-frontend-zeta-umber.vercel.app
